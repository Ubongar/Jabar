spring.application.name=student-management

spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/student_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Mikels3442}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

server.port=8081

# Actuator endpoint exposure defaults (safe baseline)
management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true
management.endpoint.info.enabled=true
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info
management.endpoints.web.exposure.exclude=env,beans,configprops,mappings,threaddump,heapdump,loggers,shutdown
management.endpoint.health.show-details=never
